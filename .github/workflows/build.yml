name: Build CLI

on:
  workflow_dispatch:

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build x86_64
        run: cd cli && cargo build --release
      - name: Prepare artifact
        run: |
          cp cli/target/release/code ./patch-copilot-linux-x86_64
          chmod +x ./patch-copilot-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: patch-copilot-linux-x86_64
          path: patch-copilot-linux-x86_64

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu
      - name: Install cross deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
      - name: Build aarch64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cd cli && cargo build --release --target aarch64-unknown-linux-gnu
      - name: Prepare artifact
        run: |
          cp cli/target/aarch64-unknown-linux-gnu/release/code ./patch-copilot-linux-aarch64
          chmod +x ./patch-copilot-linux-aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: patch-copilot-linux-aarch64
          path: patch-copilot-linux-aarch64

  publish:
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Layout binaries for Remote-SSH
        env:
          COMMIT: 6928394f91b684055b873eecb8bc281365131f1c
        run: |
          SRCDIR="commit:${COMMIT}"
          mkdir -p "${SRCDIR}/cli-alpine-x64"
          mkdir -p "${SRCDIR}/cli-alpine-arm64"
          cp artifacts/patch-copilot-linux-x86_64/patch-copilot-linux-x86_64 "${SRCDIR}/cli-alpine-x64/stable"
          cp artifacts/patch-copilot-linux-aarch64/patch-copilot-linux-aarch64 "${SRCDIR}/cli-alpine-arm64/stable"
          chmod +x "${SRCDIR}/cli-alpine-x64/stable"
          chmod +x "${SRCDIR}/cli-alpine-arm64/stable"
          ls -lh "${SRCDIR}/cli-alpine-x64/stable" "${SRCDIR}/cli-alpine-arm64/stable"
      - name: Commit & push binaries
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -- "./commit:${COMMIT}/"
          git commit -m "Update binaries" || echo "No changes"
          git push
