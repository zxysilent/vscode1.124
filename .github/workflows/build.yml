name: Build CLI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build x86_64
        run: |
          cd cli
          cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch-copilot-linux-x86_64
          path: cli/target/release/code

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu
      - name: Install cross deps
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build aarch64
        run: |
          cd cli
          cargo build --release --target aarch64-unknown-linux-gnu
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch-copilot-linux-aarch64
          path: cli/target/aarch64-unknown-linux-gnu/release/code
